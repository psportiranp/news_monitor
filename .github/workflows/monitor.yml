name: News Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news monitor
        env:
          NOTIFY_PLATFORM: ${{ secrets.NOTIFY_PLATFORM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EITAA_TOKEN: ${{ secrets.EITAA_TOKEN }}
          EITAA_CHAT_ID: ${{ secrets.EITAA_CHAT_ID }}
        run: python news_monitor.py

      - name: Save state back to the repo
        run: |
          git config user.name "news-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
